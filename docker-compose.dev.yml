# Local dev stack for v1 ingest. NOT for deployment — k8s lives in homelab-ops.
# Redpanda stands in for Strimzi Kafka + Karapace (its built-in Schema Registry is
# Confluent-SR wire-compatible, so the 5-byte magic+id framing matches prod exactly).
services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --node-id=0
      # Two listeners with DISTINCT advertised addresses: a single advertised address can't
      # serve both in-network containers and the host. Clients connect, then follow the
      # advertised address back — so `internal` advertises `redpanda:9092` (containers:
      # ingest, redpanda-init) and `external` advertises `localhost:19092` (host tools via
      # the published port). With one localhost-advertised listener, container clients
      # connect to redpanda:9092 but get redirected to localhost and fail.
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --schema-registry-addr=0.0.0.0:8081
    ports:
      - "19092:19092" # Kafka (host access)
      - "8081:8081"   # Schema Registry (Confluent-compatible)
      - "9644:9644"   # Admin / metrics
    healthcheck:
      # rpk has no --format json for `cluster health` in v24.2.x, so match the text
      # output. -i tolerates case and the loose pattern tolerates whitespace changes.
      test: ["CMD-SHELL", "rpk cluster health | grep -qi 'healthy.*true'"]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 20s

  # Pre-create topics so the ingest service never auto-creates with wrong partition counts.
  redpanda-init:
    image: redpandadata/redpanda:v24.2.7
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      # `-X brokers=redpanda:9092` targets the broker's internal advertised listener.
      # Tolerate "already exists" on re-run, but fail loud on any other error (a silent
      # `|| true` previously masked a connection failure -> topics never got created).
      # `$$` escapes compose's own variable interpolation so the shell sees a literal `$`.
      - |
        set -euo pipefail
        create() {
          out=$$(rpk topic create "$$1" -p "$$2" -r 1 -X brokers=redpanda:9092 2>&1) || true
          echo "$$out"
          echo "$$out" | grep -Eq 'OK|TOPIC_ALREADY_EXISTS' || { echo "FAILED to create $$1" >&2; exit 1; }
        }
        create bsky.posts.v1   6
        create bsky.likes.v1   6
        create bsky.follows.v1 6
        create bsky.dlq.v1     1

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bsky
      POSTGRES_PASSWORD: bsky
      POSTGRES_DB: bsky_ingest
    ports:
      - "5432:5432"
    volumes:
      - ./ingest/sql/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bsky -d bsky_ingest"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ClickHouse sink: Kafka-engine table + MV -> ReplacingMergeTree mart (see
  # clickhouse/init/001_posts.sql). Part of the default infra set (`make up`) so the
  # ingest->CH path is up before ingest runs. Init SQL + the SR-URL profile fix are mounted
  # read-only via the official image's standard config/init dirs.
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    depends_on:
      redpanda:
        condition: service_healthy
      # The topic must exist before the Kafka engine starts polling; redpanda-init creates
      # it and exits, so wait for it to COMPLETE (not just be healthy -- it has no healthcheck).
      redpanda-init:
        condition: service_completed_successfully
    ports:
      - "8123:8123" # HTTP (Grafana datasource, clients)
      - "9000:9000" # native protocol (clickhouse-client)
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./clickhouse/init/001_posts.sql:/docker-entrypoint-initdb.d/001_posts.sql:ro
      - ./clickhouse/config/users.d/avro_sr.xml:/etc/clickhouse-server/users.d/avro_sr.xml:ro
      - ./clickhouse/config/users.d/dev_default_user.xml:/etc/clickhouse-server/users.d/dev_default_user.xml:ro
      - ./clickhouse/config/config.d/kafka.xml:/etc/clickhouse-server/config.d/kafka.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 15s

  # Grafana view over the posts mart. Profile-gated (like ingest) so `make up` stays lean;
  # `make grafana` brings it up. Queries bsky.posts_dedup (FINAL) so replay dups don't inflate
  # panels. Anonymous admin + plugin install are dev-only conveniences.
  grafana:
    profiles: ["grafana"]
    image: grafana/grafana:11.2.0
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  # The ingest service itself. Gated behind the "ingest" profile so a plain
  # `docker compose up` (or `make up`) brings up ONLY infra — ingest is started
  # separately (`make run-ingest`) so it can be killed/restarted for the crash-resume
  # test without disturbing Redpanda/Postgres state (the persisted cursor must survive).
  ingest:
    profiles: ["ingest"]
    build: .
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      # config.py reads env with the INGEST_ prefix. These point at the in-network
      # services; Redpanda's built-in Schema Registry (8081) is Confluent-SR wire-compatible.
      INGEST_KAFKA_BOOTSTRAP: redpanda:9092
      INGEST_SCHEMA_REGISTRY_URL: http://redpanda:8081
      INGEST_POSTGRES_DSN: postgresql://bsky:bsky@postgres:5432/bsky_ingest
      INGEST_STREAM_NAME: jetstream-main
    volumes:
      # The Dockerfile does not COPY tests/ into the image; mount the malformed fixture
      # read-only so the in-network DLQ injector (dev_inject_dlq) can read it.
      - ./tests/fixtures:/app/tests/fixtures:ro
    # Don't auto-restart: a manual Ctrl-C / SIGKILL must stay down for the crash-resume test.
    restart: "no"
