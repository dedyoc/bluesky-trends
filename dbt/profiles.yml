# dbt-clickhouse profile for local dev. Targets the host-published ClickHouse HTTP port;
# the dev `default` user has an empty password (clickhouse/config/users.d/dev_default_user.xml).
# Prod creds come from env (homelab-ops), never committed here.
bsky:
  target: dev
  outputs:
    dev:
      type: clickhouse
      host: "{{ env_var('BSKY_DAGSTER_CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('BSKY_DAGSTER_CLICKHOUSE_PORT', '8123') | int }}"
      user: "{{ env_var('BSKY_DAGSTER_CLICKHOUSE_USER', 'default') }}"
      password: "{{ env_var('BSKY_DAGSTER_CLICKHOUSE_PASSWORD', '') }}"
      schema: bsky
      secure: false
      driver: http
